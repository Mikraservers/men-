<title>QR Menü</title>

<style>
body{
  margin:0;

  font-family:system-ui;

/* Menü görselleri */
.menu img{
  width:100%;
  display:block;
  height:auto;
}

/* küçük loading hissi */

  animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{

}
